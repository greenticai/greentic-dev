<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greentic Developer Wizard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 id="title">Greentic Developer Wizard</h1>
        </header>
        <main>
            <div id="launcher" class="wizard-step">
                <p class="loading">Loading...</p>
            </div>
            <div id="status" class="wizard-step" style="display:none">
                <p id="status-message"></p>
            </div>
        </main>
    </div>
    <script src="/app.js"></script>
</body>
</html>
